# Firmware Repository Configuration
#
# REPO_URL: Base URL for the firmware repository server.
#   Firmware files are fetched as: <REPO_URL>/<firmware_filename>
#   Flash tools are fetched as:    <REPO_URL>/tools/<tool_name>
#   Do NOT include trailing slashes or path prefixes like /files.
#
# MANIFEST_URL: URL for the remote manifest.json (optional).
#   If set, firmware-check will fetch the latest manifest from here,
#   falling back to the local manifest if unreachable.
#   This allows servers to learn about new firmware without a package update.
#
# VERIFY_GPG: Whether to require GPG signature verification on remote manifest.
#   true  = Enforced (default for customer machines pulling from repo.45drives.com)
#   false = Skip verification (for internal assembly/production servers)
#
# Production (customer machines — GPG enforced):
#   REPO_URL=https://repo.45drives.com/firmware
#   MANIFEST_URL=https://repo.45drives.com/firmware/manifest.json
#   VERIFY_GPG=true
#
# Internal assembly server (signed but not verified):
#   REPO_URL=http://192.168.209.126:8089
#   MANIFEST_URL=http://192.168.209.126:8089/manifest.json
#   VERIFY_GPG=false
#
# To test GPG end-to-end locally, set VERIFY_GPG=true below.
# The firmware-admin server auto-signs the manifest on upload, so the .sig
# file will always be available. This tests the full production path
# (fetch manifest → fetch .sig → gpgv verify) against the dev server.
#
# Development/testing:
REPO_URL=http://192.168.209.126:8089
MANIFEST_URL=http://192.168.209.126:8089/manifest.json
VERIFY_GPG=true
